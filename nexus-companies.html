    /* Tab active underline */

        </div>
        <div class="flex items-center gap-2">

          </button>
          <button class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 1-1 1.7"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>

      <!-- Table -->

            <tr class="text-left text-[13px] font-medium text-slate-500">

  <script>
    // --- Tab switching -----------------------------------------------------
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // --- Status & Employee badge helpers -----------------------------------
    const STATUS = {
      Active:   'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200/60',
      Prospect: 'bg-amber-100   text-amber-700   ring-1 ring-amber-200/60',
      Inactive: 'bg-slate-200   text-slate-500   ring-1 ring-slate-300/60',
    };
    const EMP = {
      '100K+':    'bg-violet-100  text-violet-700  ring-1 ring-violet-200/60',
      '250 - 1k': 'bg-amber-100   text-amber-700   ring-1 ring-amber-200/60',
      '10K - 50K':'bg-sky-100     text-sky-700     ring-1 ring-sky-200/60',
      '5K - 10K': 'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200/60',
      '1-50':     'bg-slate-100   text-slate-600   ring-1 ring-slate-200/60',
    };

    // --- Company logo tiles (15 unique colored squares with SVG icon) ------
    function logoTile(bg, svg) {
      return `<span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg ${bg} text-white">${svg}</span>`;
    }
    const ICONS = {
      hex:    '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3 4 7v10l8 4 8-4V7z"/><path d="M12 7v10M4 7l8 4 8-4M4 17l8-4 8 4"/></svg>',
      flow:   '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12c4-6 12 6 16 0"/><path d="M4 18c4-6 12 6 16 0"/></svg>',
      plus:   '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><path d="M11 4h2v7h7v2h-7v7h-2v-7H4v-2h7z"/></svg>',
      hive:   '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5"  r="2.5"/><circle cx="12" cy="19" r="2.5"/><circle cx="5"  cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg>',
      gem:    '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><path d="M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8m-7 12 7 6 7-6-3.5-4h-7z"/></svg>',
      square: '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>',
      leaf:   '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c-9 0-15 5-15 12a4 4 0 0 0 4 4c7 0 11-7 11-16z"/><path d="M5 20 14 11"/></svg>',
      ast:    '<svg viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><path d="M12 2v20M3 7l18 10M21 7 3 17"/></svg>',
