<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>错题集管理 · 标注 Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/shared.css" />
  <script>tailwind.config = { theme: { extend: { colors: { brand:'#22C55E', brandDark:'#16A34A' } } } };</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div class="flex h-screen w-screen overflow-hidden">
    <div id="sidebar-root" class="h-full"></div>

    <main class="flex h-full flex-1 flex-col overflow-hidden bg-white">

      <header class="flex items-center justify-between px-8 pt-6 pb-3">
        <div class="flex items-center gap-2">
          <h1 class="text-[28px] font-bold tracking-tight text-slate-900">错题集管理</h1>
          <span class="ml-3 inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-600" id="es-count-badge">…</span>
        </div>
        <div class="flex items-center gap-2">
          <select id="es-scene-filter" class="h-10 rounded-xl border border-slate-200 bg-white px-3 text-sm outline-none focus:border-emerald-400">
            <option value="">全部场景</option>
          </select>
        </div>
      </header>

      <!-- 双栏 -->
      <div class="flex flex-1 overflow-hidden px-8 pb-6 gap-6">

        <!-- 左:错题集 + 散错题列表 -->
        <aside class="w-80 shrink-0 flex flex-col rounded-xl border border-slate-200 bg-slate-50/40">
          <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200">
            <div class="text-sm font-semibold text-slate-700">错题集 / 散错题</div>
            <button id="es-merge-btn" disabled class="text-xs font-medium text-slate-400 hover:underline disabled:cursor-not-allowed">
              ➕ 合并所选 (<span id="es-sel-count">0</span>)
            </button>
          </div>
          <div class="overflow-auto scroll-thin flex-1 px-2 py-2 space-y-1" id="es-left-list"></div>
        </aside>

        <!-- 右:详情 -->
        <section class="flex-1 flex flex-col rounded-xl border border-slate-200 overflow-hidden">
          <div id="es-detail" class="flex-1 overflow-auto scroll-thin"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- 合并为错题集 -->
  <div id="es-merge-modal" class="modal-mask">
    <div class="modal-card w-[460px]">
      <div class="flex items-center justify-between border-b border-slate-100 px-6 py-4">
        <div class="text-base font-semibold text-slate-900">合并为错题集</div>
        <button class="text-slate-400 hover:text-slate-700" onclick="NX.closeModal(document.getElementById('es-merge-modal'))">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6 18 18M18 6 6 18"/></svg>
        </button>
      </div>
      <div class="px-6 py-5 space-y-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">错题集名称 <span class="text-rose-500">*</span></label>
          <input id="es-merge-name" class="block h-10 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm outline-none focus:border-emerald-400" placeholder="如:情感分类·边界用例" />
          <div class="text-xs text-slate-400 mt-1">Prompt 中以 {{错题集.<名称>}} 引用</div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">备注</label>
          <textarea id="es-merge-desc" rows="3" class="block w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-emerald-400"></textarea>
        </div>
      </div>
      <div class="flex items-center justify-end gap-2 border-t border-slate-100 px-6 py-3">
        <button onclick="NX.closeModal(document.getElementById('es-merge-modal'))" class="h-9 rounded-lg border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 hover:bg-slate-50">取消</button>
        <button onclick="ErrorSetsPage.confirmMerge()" class="h-9 rounded-lg bg-brand px-4 text-sm font-semibold text-white hover:bg-brandDark">创建</button>
      </div>
    </div>
  </div>

  <script src="../assets/shared.js"></script>
  <script src="../assets/mock/scenes.js"></script>
  <script src="../assets/mock/error-sets.js"></script>
  <script src="../assets/pages/error-sets.js"></script>
</body>
</html>
