<!doctype html>
<html lang="zh-CN" data-theme="white" data-mode="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM 标注工具</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/vendor/tabulator.min.css">
  <link rel="stylesheet" href="/assets/app.css?v=20260530-source-switch">
  <link rel="stylesheet" href="/assets/components.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">LLM</div>
      <div>
        <strong>LLM 标注工具</strong>
        <span>本地数据飞轮工作台</span>
      </div>
    </div>
    <nav class="workflow-tabs" aria-label="主流程">
      <button class="workflow-tab" data-page="manage"><span>1</span>数据集与方案管理</button>
      <i class="workflow-arrow">›</i>
      <button class="workflow-tab active" data-page="workbench"><span>2</span>标注工作台</button>
    </nav>
    <div class="theme-tools">
      <button class="icon-btn" id="modeToggle" type="button" title="切换明暗模式" onclick="window.__toggleMode?.()">◐</button>
      <button class="btn" id="themeButton" type="button" onclick="window.__toggleThemePopover?.(event)">主题</button>
      <div class="theme-popover" id="themePopover">
        <button type="button" data-theme-choice="white" onclick="window.__chooseTheme?.('white', event)"><i class="swatch white"></i>白色</button>
        <button type="button" data-theme-choice="blue" onclick="window.__chooseTheme?.('blue', event)"><i class="swatch blue"></i>蓝色</button>
        <button type="button" data-theme-choice="purple" onclick="window.__chooseTheme?.('purple', event)"><i class="swatch purple"></i>紫色</button>
        <button type="button" data-theme-choice="orange" onclick="window.__chooseTheme?.('orange', event)"><i class="swatch orange"></i>橙色</button>
        <button type="button" data-theme-choice="green" onclick="window.__chooseTheme?.('green', event)"><i class="swatch green"></i>绿色</button>
        <button type="button" data-theme-choice="black" onclick="window.__chooseTheme?.('black', event)"><i class="swatch black"></i>黑色</button>
        <button type="button" data-theme-choice="red" onclick="window.__chooseTheme?.('red', event)"><i class="swatch red"></i>红色</button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="page" id="page-manage"></section>
    <section class="page active" id="page-workbench"></section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="floating-menu" id="rowMoreMenu">
    <button data-row-action="edit">编辑</button>
    <button data-row-action="export">导出</button>
    <button class="danger" data-row-action="delete">删除</button>
  </div>

  <script>
    (() => {
      const root = document.documentElement;
      if (root.dataset.themeToolsReady === "true") return;

      const readPreference = (key, fallback) => {
        try {
          return localStorage.getItem(key) || fallback;
        } catch {
          return fallback;
        }
      };
      const writePreference = (key, value) => {
        try {
          localStorage.setItem(key, value);
        } catch {
          root.dataset[key] = value;
        }
      };

      const themeAliases = { default: "white", cobalt: "blue", teal: "green", indigo: "purple", emerald: "green", graphite: "black", berry: "purple", coral: "orange", lime: "green", sky: "blue", rose: "red" };
      const allowedThemes = new Set(["white", "blue", "purple", "orange", "green", "black", "red"]);
      const normalizeThemeChoice = (theme) => {
        const normalized = themeAliases[theme] || theme || "white";
        return allowedThemes.has(normalized) ? normalized : "white";
      };
      const applyThemeChoice = (theme) => {
        const normalized = normalizeThemeChoice(theme);
        root.dataset.theme = normalized;
        return normalized;
      };
      const applyModeChoice = (mode) => {
        root.dataset.mode = mode === "dark" ? "dark" : "light";
      };

      const themeButton = document.querySelector("#themeButton");
      const themePopover = document.querySelector("#themePopover");
      const modeToggle = document.querySelector("#modeToggle");

      const storedThemeChoice = readPreference("themeChoice", "white");
      const initialThemeChoice = applyThemeChoice(storedThemeChoice);
      if (storedThemeChoice !== initialThemeChoice) writePreference("themeChoice", initialThemeChoice);
      applyModeChoice(readPreference("modeChoice", root.dataset.mode || "light"));

      if (!themeButton || !themePopover || !modeToggle) return;

      window.__toggleThemePopover = (event) => {
        event.stopPropagation();
        themePopover.classList.toggle("open");
      };
      window.__chooseTheme = (theme, event) => {
        event?.stopPropagation();
        const normalized = applyThemeChoice(theme);
        writePreference("themeChoice", normalized);
        themePopover.classList.remove("open");
      };
      window.__toggleMode = () => {
        const next = root.dataset.mode === "dark" ? "light" : "dark";
        applyModeChoice(next);
        writePreference("modeChoice", next);
      };

      if (!themeButton.onclick) themeButton.addEventListener("click", window.__toggleThemePopover);
      themePopover.addEventListener("click", (event) => event.stopPropagation());
      document.addEventListener("click", () => themePopover.classList.remove("open"));
      document.querySelectorAll("[data-theme-choice]").forEach((button) => {
        if (button.onclick) return;
        button.addEventListener("click", () => {
          window.__chooseTheme(button.dataset.themeChoice);
        });
      });
      if (!modeToggle.onclick) modeToggle.addEventListener("click", window.__toggleMode);
      root.dataset.themeToolsReady = "true";
    })();
  </script>
  <script src="/vendor/gsap.min.js"></script>
  <script src="/vendor/tabulator.min.js"></script>
  <script type="module" src="/assets/app.js?v=20260530-source-switch"></script>
</body>
</html>
